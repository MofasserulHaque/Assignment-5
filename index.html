<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-gray-100 min-h-screen">
   
<nav class="flex justify-between items-center mb-10 px-10 bg-white gap-6 py-3">
    <div class="flex flex-1 items-center gap-4"><img class="w-[40px] h-[40px] object-cover" src="./assets/github-logo.png" alt=""> <p class="text-2xl font-bold m-[-7px]">GitHub Issues Tracker</p></div>
    <div class="flex gap-2.5 items-center">
        <input id="search-input" type="text" placeholder="Search Issues" class="border border-2 rounded-3xl p-1.5 border-blue-700">
        <button id="search-btn" class="btn btn-primary">Search</button>
    </div>
</nav>
<section class=" min-h-screen flex justify-center items-center hidden">
   <section class="w-[500px] bg-white grid justify-center items-center mx-auto rounded-2xl py-5">
    <div>
       <p class="text-center flex justify-center "> <img  src="./assets/github-logo.png" alt=""></p>
        <h1 class="text-center text-2xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-center text-gray-400 font-semibold">Sign in to manage your issues</p>
    </div>
    <div class="space-y-[-5px] mx-5">
        <label for="">Username</label><br>
      <label class="input validator">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </g>
  </svg>
  <input
    type="text"
    required
    placeholder="Username"
    pattern="[A-Za-z][A-Za-z0-9\-]*"
    minlength="3"
    maxlength="30"
    title="Only letters, numbers or dash"
  />
</label>
<p class="validator-hint">
  Must be 3 to 30 characters
  containing only letters, numbers or dash
</p>
        <label for="">Password</label><br>
        <label class="input validator">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <path
        d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
      ></path>
      <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
    </g>
  </svg>
  <input
    type="password"
    required
    placeholder="Enter Password'admin123'"
    minlength="8"
    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
    title="Must be more than 8 characters, including number, lowercase letter, uppercase letter"
  />
</label>
<p class="validator-hint hidden">
  Must be more than 8 characters, including
  <br />At least one number <br />At least one lowercase letter <br />At least one uppercase letter
</p>
       <br>
        <button class="btn btn-primary btn-block my-5"> Sign In</button>
    </div>
 </section>
</section>
<script src="./index.js"></script>
</body>
</html>
